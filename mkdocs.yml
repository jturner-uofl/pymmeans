site_name: pymmeans
site_description: >-
  pymmeans is estimated marginal means (EMMs / least-squares means) for
  Python — a native implementation of R's emmeans and pbkrtest with no R
  dependency. Contrasts, multiplicity adjustments, Kenward-Roger and
  Satterthwaite degrees of freedom, machine-learning g-computation,
  conformal prediction, and doubly-robust estimation.
site_author: Jason S. Turner
site_url: https://jturner-uofl.github.io/pymmeans/
repo_url: https://github.com/jturner-uofl/pymmeans
repo_name: jturner-uofl/pymmeans
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  logo: null
  favicon: null

extra_css:
  - stylesheets/pymmeans.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jturner-uofl/pymmeans
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pymmeans/
  generator: false

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true
            show_root_heading: true
            heading_level: 3
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      permalink_title: Anchor link

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - API reference:
      - emmeans: api/emmeans.md
      - contrasts: api/contrasts.md
      - emtrends: api/emtrends.md
      - plotting: api/plotting.md
      - summary (bootstrap + permutation): api/summary.md
      - summary_layer (summary/confint/test/update/as_r_frame): api/summary_layer.md
      - joint_tests: api/joint.md
      - satterthwaite: api/satterthwaite.md
      - pbmodcomp (parametric-bootstrap nested test): api/pbmodcomp.md
      - pbktest (Kenward-Roger / Satterthwaite F-tests): api/pbktest.md
      - ordinal (cumulative-link ordinal regression): api/ordinal.md
      - multinom (multinomial-logit EMMs): api/multinom.md
      - multivariate (mlm + mvcontrast Hotelling): api/multivariate.md
      - aft (Accelerated Failure Time, lifelines): api/aft.md
      - qdrg (hand-built reference grids): api/qdrg.md
      - adjustments: api/adjustments.md
      - utils: api/utils.md
      - adapters (register_adapter / protocol): api/adapters.md
      - ml (predict-only adapter): api/ml.md
      - posterior (PyMC / arviz): api/posterior.md
      - cld (compact letter display): api/cld.md
      - pwpm (pairwise comparison matrix): api/pwpm.md
      - transforms (back-transformation): api/transforms.md
      - options: api/options.md
      - ref_grid: api/ref_grid.md
      - grid_ops (add_grouping / comb_facs / split_fac / permute_levels): api/grid_ops.md
      - diagnostics (health_check): api/diagnostics.md
      - survey (design-corrected vcov): api/survey.md
      - sensitivity (VanderWeele-Ding E-value): api/sensitivity.md
      - imputation (Rubin's rules pooling): api/imputation.md
      - conformal (split + Lei-Candès counterfactual PIs): api/conformal.md
      - double_ml (cross-fit + AIPW double-robust ATE): api/double_ml.md
      - slopes (avg_slopes / marginal effects): api/slopes.md
      - hypotheses (nonlinear delta-method tests): api/hypotheses.md
  - vs R emmeans:
      - Performance: PERFORMANCE_REPORT.md
      - Validation: vs-r.md
      - Parity matrix: r_parity_matrix.md
  - Project:
      - v0.2 roadmap: v0_2_roadmap.md
